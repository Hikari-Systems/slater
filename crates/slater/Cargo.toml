[package]
name = "slater"
description = "Slater online server: read-only Bolt/Cypher over the immutable on-disk graph format, bounded resident memory."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[[bin]]
name = "slater"
path = "src/main.rs"

[dependencies]
graph-format.workspace = true
slater-scalar.workspace = true
hs-utils.workspace = true
anyhow.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
tracing.workspace = true
tokio.workspace = true
rustls.workspace = true
tokio-rustls.workspace = true
rustls-pemfile.workspace = true
argon2.workspace = true
rayon.workspace = true
wide.workspace = true
clap.workspace = true
pest.workspace = true
pest_derive.workspace = true
regex.workspace = true
chrono.workspace = true

[features]
default = []
# Enable the S3 / object-store data backend (forwards to graph-format).
s3 = ["graph-format/s3"]
# Enable the GCS data backend (forwards to graph-format).
gcs = ["graph-format/gcs"]

[lints.rust]
# The server's only `unsafe` is the single libc `malloc_trim` FFI call in
# `server::trim_allocator` (idle-path heap return, not query execution), carrying a
# scoped `#[allow(unsafe_code)]`. Deny everywhere else so no new `unsafe` slips into
# the serving path. (Deny, not forbid, so that one audited site can opt out.)
unsafe_code = "deny"

[dev-dependencies]
criterion.workspace = true

[[bench]]
name = "vector_knn"
harness = false
