name: ci

# Fast feedback on every push and pull request: formatting and clippy must be
# clean, the whole workspace must compile, and the fast test suite must pass.
# `release.yml` re-runs the same `cargo test --workspace` as its publish gate and
# adds the tag-only heavy work (fuzzing, multi-arch images, release binaries);
# this workflow is the per-commit signal behind the README's build badge.
on:
  push:
  pull_request:

# A newer push to the same ref supersedes an in-flight run — don't waste runners
# finishing checks on a commit that's already been replaced.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Every job here only checks out and builds — none write back to the repo or touch
# other GITHUB_TOKEN-scoped APIs. Pin the token to read-only (mirrors release.yml)
# so a compromised step can't push, open PRs, or alter releases.
permissions:
  contents: read

jobs:
  # ── Formatting: mirror the local pre-commit hook (.githooks/pre-commit) ─────
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Formatting
        run: cargo fmt --all --check

  # ── Clippy: mirror the local pre-commit hook (.githooks/pre-commit) ────────
  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # `bench-codec` is gated behind a `required-features` cargo feature, so the
      # default `--all-targets` above skips it. Lint it explicitly (with `s3` so its
      # backend leg is covered too) to keep the gated tuning binary from bitrotting.
      - name: Clippy (bench-codec)
        run: cargo clippy -p slater-build --all-targets --features bench-codec,s3 -- -D warnings

      # `testkit` gates slater's benches and several integration tests behind a
      # `required-features` flag, so the `--all-targets` lint above never compiles
      # them — they can rot silently, the same shape as the s3/gcs hole (HIK-138
      # audit). Lint them explicitly.
      - name: Clippy (slater testkit targets)
        run: cargo clippy -p slater --all-targets --features testkit -- -D warnings

  # ── Build: the whole workspace must compile against the committed lockfile ──
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # rustls' aws-lc-rs backend needs a C toolchain + libclang to build (see
      # the Dockerfile builder stage and release.yml).
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build the workspace
        run: cargo build --workspace --locked

  # ── Test: the fast suite, per-commit ───────────────────────────────────────
  # `cargo test --workspace` — the exact command `release.yml` runs as its publish
  # gate. The heavy tests (large-graph builds, live S3/GCS, the real slater-build
  # binary) are `#[ignore]`d or env-gated, so only the ~1450 fast unit/integration
  # tests run here. This suite used to run *only* on a tag, so a change that
  # compiled and linted clean but broke a unit test could merge green and surface
  # only at release; running it on every commit closes that gap.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # rustls' aws-lc-rs backend needs a C toolchain + libclang to build (see the
      # build job and the Dockerfile builder stage).
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Test suite
        run: cargo test --workspace --locked

  # ── Store backends: compile + run the feature-gated s3/gcs code that the
  #    default build never touches (HIK-138). Whole modules under
  #    `graph-format/src/store/{s3,gcs}.rs` and every `tests/{s3_minio,gcs_*}.rs`
  #    file are `#[cfg(feature = …)]`, so a plain `cargo test` / `cargo clippy`
  #    neither builds nor lints them — which is how two disk-cache bugs *and* a
  #    non-compiling gcs test shipped unnoticed. The integration tests self-skip
  #    without a live MinIO/GCS endpoint (they gate on the SLATER_{S3,GCS}_TEST_*
  #    env vars), so this job needs no cloud credentials: its purpose is to keep
  #    the gated source and test modules building and lint-clean on every commit.
  #    Each backend is exercised alone and together, so a feature that only
  #    compiles alongside the other is still caught.
  store-backends:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        features: [s3, gcs, "s3,gcs"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # rustls' aws-lc-rs backend (pulled by the s3 SDK) needs a C toolchain +
      # libclang, same as the build job and the Dockerfile builder stage.
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Clippy (graph-format, ${{ matrix.features }})
        run: cargo clippy -p graph-format --all-targets --features ${{ matrix.features }} --locked -- -D warnings

      # Compiles the gated lib unit tests and the tests/{s3_minio,gcs_*}.rs
      # integration files — a non-compiling gated test is now a red build — and
      # runs everything that doesn't need a live endpoint; the cloud tests self-skip.
      - name: Test (graph-format, ${{ matrix.features }})
        run: cargo test -p graph-format --features ${{ matrix.features }} --locked
