name: release

# On a vX.Y.Z tag this workflow does both release jobs in one place:
#   1. Docker image — build natively per arch (a Rust build under QEMU emulation
#      would be far too slow), push each arch to Docker Hub *by digest* so no
#      per-arch tags are created, then merge the digests into a single manifest
#      tagged with the git tag (e.g. hikarisystems/slater:v0.1.3) and `latest`.
#   2. Release binaries — build the compiled `slater` + `slater-build` binaries
#      and attach them (plus checksums) to the GitHub release for the tag.
#      GitHub already attaches the "Source code (zip/tar.gz)" archives itself.
#
# Both can also be run manually against an existing tag via the Actions tab
# (workflow_dispatch), e.g. `gh workflow run release.yml -f tag=v0.1.1`.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build, push and attach binaries to (e.g. v0.1.1)'
        required: true

# The release job needs write access to create/update the release and upload assets.
permissions:
  contents: write

jobs:
  # ── Gate: the whole workspace test suite must pass before anything ships ───
  # Every publishing job below `needs: [test, fuzz]`, so a red test run or a fuzz
  # crash blocks the Docker push and the binary release for this tag.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # rustls' aws-lc-rs backend needs a C toolchain + libclang to build (see
      # the Dockerfile builder stage).
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      # Mirror the local pre-commit hook (.githooks/pre-commit) so a release can't
      # ship a formatting regression even if someone committed with --no-verify.
      - name: Formatting
        run: cargo fmt --all --check

      # The whole workspace suite — unit + integration (graph-format crypto/MAC,
      # the ACL-stamp + manifest-MAC server tests, golden round-trips). `--locked`
      # builds against the committed Cargo.lock, matching the release binaries.
      - name: Test suite
        run: cargo test --workspace --locked

  # ── Gate: fuzz the untrusted-input decoders before shipping a tag ──────────
  # The Cypher parser and the Bolt/PackStream decoders (targets in `fuzz/`) each
  # get a time-boxed libFuzzer run. Run only on tagged builds — not on every CI
  # iteration — so each target can fuzz for several minutes rather than seconds.
  # The targets fan out one-per-runner across a Blacksmith matrix (as the Docker
  # build does), so they run in parallel and a crash fails only its own leg while
  # still blocking the release. cargo-fuzz needs nightly + libFuzzer.
  fuzz:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: [parse_query, packstream_decode, chunk_decode]
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # rustls' aws-lc-rs backend needs a C toolchain + libclang to build.
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev

      - name: Install the nightly Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          key: ${{ matrix.target }}

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      # `cargo fuzz run` builds just this target before running it, so a build
      # error (a target that no longer matches the API) still fails the leg.
      - name: Fuzz ${{ matrix.target }}
        run: |
          cargo +nightly fuzz run "${{ matrix.target }}" -- \
            -max_total_time=300 -rss_limit_mb=2048 -max_len=65536

      # On a crash, libFuzzer writes a reproducer under fuzz/artifacts — keep it.
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 7

  # ── Docker: native per-arch build, pushed to Docker Hub by digest ──────────
  docker-build:
    needs: [test, fuzz]
    runs-on: ${{ matrix.runner }}
    # Slater is a heavy Rust build (rustls/aws-lc-rs, tokio, zstd, argon2); give
    # each native arch plenty of wall-clock on the 2-vCPU runners.
    timeout-minutes: 90
    strategy:
      matrix:
        platform: [amd64, arm64]
        include:
          - platform: amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - platform: arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
    steps:
      - name: Make repo name
        run: echo "REPO_NAME=$(echo ${{ github.repository }} | sed -e 's/^Hikari-Systems\///')" >> $GITHUB_ENV

      - name: Checkout the tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/${{ matrix.platform }}
          outputs: type=image,name=hikarisystems/${{ env.REPO_NAME }},push-by-digest=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.platform }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Docker: merge the per-arch digests into one tagged manifest ────────────
  docker-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docker-build
    steps:
      - name: Make repo name
        run: echo "REPO_NAME=$(echo ${{ github.repository }} | sed -e 's/^Hikari-Systems\///')" >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create the manifest tagged with the git tag and latest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t hikarisystems/${{ env.REPO_NAME }}:${{ github.event.inputs.tag || github.ref_name }} \
            -t hikarisystems/${{ env.REPO_NAME }}:latest \
            $(printf 'hikarisystems/${{ env.REPO_NAME }}@sha256:%s ' *)

  # ── GitHub release: compiled binaries + checksums attached to the tag ──────
  release-binaries:
    needs: [test, fuzz]
    runs-on: ubuntu-latest
    env:
      # The tag this run targets: the pushed ref, or the manual dispatch input.
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          # Full history + tags so the annotated tag's message is readable below.
          fetch-depth: 0

      # The annotated tag's message is the human-written release description. We
      # prepend it to the auto-generated changelog so every release carries a
      # proper description (see CONTRIBUTING.md). A lightweight tag with no
      # annotation falls back to the generated notes alone.
      - name: Derive release notes from the tag annotation
        id: notes
        run: |
          set -euo pipefail
          body="$(git for-each-ref "refs/tags/${TAG}" --format='%(contents)')"
          if [ -z "${body//[[:space:]]/}" ]; then
            echo "::warning::tag ${TAG} has no annotation — falling back to generated notes only. Tag with 'git tag -a ${TAG} -m \"…\"' for a proper description."
          fi
          {
            echo "body<<__RELEASE_NOTES__"
            echo "$body"
            echo "__RELEASE_NOTES__"
          } >> "$GITHUB_OUTPUT"

      # rustls' aws-lc-rs backend needs a C toolchain + libclang to build (see
      # the Dockerfile builder stage); git is already present on the runner.
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --locked --bins

      # Package both binaries into one tarball named for the tag + target triple,
      # then emit a checksum file so downloaders can verify integrity.
      - name: Package binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          tarball="slater-${TAG}-${TARGET}.tar.gz"
          tar -C target/release -czf "dist/${tarball}" slater slater-build
          ( cd dist && sha256sum *.tar.gz > SHA256SUMS.txt )
          ls -l dist

      - name: Publish binaries to the GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          # The tag annotation (a proper description) is prepended to the
          # auto-generated commit changelog.
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/slater-*.tar.gz
            dist/SHA256SUMS.txt
