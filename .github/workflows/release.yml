name: release

# On a vX.Y.Z tag this workflow does both release jobs in one place:
#   1. Docker image — build natively per arch (a Rust build under QEMU emulation
#      would be far too slow), push each arch to Docker Hub *by digest* so no
#      per-arch tags are created, then merge the digests into a single manifest
#      tagged with the git tag (e.g. hikarisystems/slater:v0.1.3) and `latest`.
#   2. Release binaries — build the compiled `slater` + `slater-build` binaries
#      and attach them (plus checksums) to the GitHub release for the tag.
#      GitHub already attaches the "Source code (zip/tar.gz)" archives itself.
#
# Both can also be run manually against an existing tag via the Actions tab
# (workflow_dispatch), e.g. `gh workflow run release.yml -f tag=v0.1.1`.
on:
  push:
    tags:
      - 'v*.*.*'
    # The `writeable` long-lived track adds new untrusted-input surface (the write
    # grammar extends the Cypher parser), so run the fuzz gate on every push to it —
    # NOT the publishing jobs. The `test` job's `if` below keeps the build/Docker/
    # release-binaries steps tag-only; a branch push runs `fuzz` and nothing else.
    branches:
      - writeable
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build, push and attach binaries to (e.g. v0.1.1)'
        required: true

# A newer push to the same ref supersedes an in-flight run — but only for the
# branch-push fuzz runs; a tag release must never cancel itself mid-publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# The release job needs write access to create/update the release and upload assets.
permissions:
  contents: write

jobs:
  # ── Gate: the whole workspace test suite must pass before anything ships ───
  # Every publishing job below `needs: [test, fuzz]`, so a red test run or a fuzz
  # crash blocks the Docker push and the binary release for this tag.
  #
  # Tag-push / manual-dispatch only: on a `writeable` branch push this job (and so,
  # transitively via `needs: test`, docker-build → docker-manifest and
  # release-binaries) is skipped, leaving `fuzz` as the only job that runs. Nothing
  # publishes off a branch push.
  test:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # git tags sort lexically (v0.1 before v0.24.0), so tools that read the raw
      # tag order mis-report the version. The authoritative version is a literal in
      # the README + DOCKERHUB.md ("Current version: `vX.Y.Z`") and in Cargo.toml.
      # Fail the release if any drifts from the tag — this is the non-bypassable
      # backstop to the local .githooks/pre-push gate (which `--no-verify` and an
      # unset hooksPath skip).
      - name: Version tag matches README + DOCKERHUB + Cargo.toml
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          ver="${tag#v}"
          doc_ver() { grep -oE 'Current version: `v[0-9]+\.[0-9]+\.[0-9]+`' "$1" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true; }
          readme="$(doc_ver README.md)"
          docker="$(doc_ver DOCKERHUB.md)"
          cargo="$(grep -m1 -E '^version = "[0-9]+\.[0-9]+\.[0-9]+"' Cargo.toml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
          echo "tag=$ver  README=${readme:-<none>}  DOCKERHUB=${docker:-<none>}  Cargo.toml=${cargo:-<none>}"
          if [ "$ver" != "$readme" ] || [ "$ver" != "$docker" ] || [ "$ver" != "$cargo" ]; then
            echo "::error::version mismatch — tag $ver, README ${readme:-<none>}, DOCKERHUB ${docker:-<none>}, Cargo.toml ${cargo:-<none>}. Bump the 'Current version' line in README.md and DOCKERHUB.md, and Cargo.toml, to $ver before tagging."
            exit 1
          fi

      # rustls' aws-lc-rs backend needs a C toolchain + libclang to build (see
      # the Dockerfile builder stage).
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      # Mirror the local pre-commit hook (.githooks/pre-commit) so a release can't
      # ship a formatting regression even if someone committed with --no-verify.
      - name: Formatting
        run: cargo fmt --all --check

      # The whole workspace suite — unit + integration (graph-format crypto/MAC,
      # the ACL-stamp + manifest-MAC server tests, golden round-trips). `--locked`
      # builds against the committed Cargo.lock, matching the release binaries.
      - name: Test suite
        run: cargo test --workspace --locked

  # ── Gate: fuzz the untrusted-input decoders before shipping a tag ──────────
  # The read + write Cypher parsers, the Bolt/PackStream decoders, the core-segment
  # decoders, and the writable-layer delta codecs (targets in `fuzz/`) each get a
  # time-boxed libFuzzer run. Runs on tag pushes, manual dispatch, and every
  # `writeable` branch push (the only job that does the last — see the `test` gate),
  # so the new write-grammar parser surface is fuzzed per commit. The targets fan
  # out one-per-runner across the matrix so they run in parallel and a crash fails
  # only its own leg while still blocking the release. cargo-fuzz needs nightly +
  # libFuzzer. Runs on free GitHub-hosted runners (this repo is public, so the
  # minutes are free) rather than the billed Blacksmith runners — the Docker build
  # below keeps Blacksmith for its native per-arch (incl. arm64) compiles.
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: [parse_query, parse_statement, packstream_decode, chunk_decode, segment_decode, wire_read_value, wal_replay]
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # rustls' aws-lc-rs backend needs a C toolchain + libclang to build.
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev

      - name: Install the nightly Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      # One shared build cache across all matrix legs (and shared with
      # fuzz-nightly.yml). Every target links the SAME instrumented dependency graph —
      # only the final target binary differs — so a per-target key stored ~7 duplicate
      # full builds and churned the 10 GB repo cache budget. `shared-key` gives one
      # stable key for the whole matrix; the first leg to finish saves it, the rest
      # restore the warm deps and just link their own binary. (The per-target *corpus*
      # cache below is separate and stays keyed per target.)
      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          shared-key: fuzz-build

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      # Warm-start from the corpus the nightly fuzzer (fuzz-nightly.yml) accumulates
      # on the default branch — caches created there are restorable from this tag
      # push, so the gate fuzzes a known-interesting corpus instead of starting from
      # empty. Restore-only: the nightly owns the saves (a save from this tag ref
      # would be tag-scoped and unreusable by other refs). The unique run_id key
      # never hits exactly, so the restore always falls through to the prefix and
      # picks up the newest nightly save.
      - name: Restore fuzz corpus
        uses: actions/cache/restore@v5
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      # `cargo fuzz run` builds just this target before running it, so a build
      # error (a target that no longer matches the API) still fails the leg.
      #
      # `--target` is pinned explicitly: cargo-fuzz otherwise defaults it to its
      # OWN build platform, and the prebuilt binary from install-action is a musl
      # build — so it would try to compile the fuzz target for
      # x86_64-unknown-linux-musl, which the minimal nightly toolchain has no std
      # for ("error[E0463]: can't find crate for `core`"). Pin to the glibc host
      # target (what we build and ship) so it compiles and actually fuzzes.
      - name: Fuzz ${{ matrix.target }}
        run: |
          # `-malloc_limit_mb` is the real guard: it fails on any *single*
          # allocation over the limit — the unbounded-allocation DoS class we
          # actually care about in these decoders. `-rss_limit_mb` is the total
          # process RSS and must sit *above* libFuzzer's own footprint (the
          # warm-started corpus + coverage tables grow over a multi-minute run),
          # or it false-positives as an OOM a few MB over the line. Keep the
          # single-allocation guard at 2 GiB; give total RSS 4 GiB of headroom.
          cargo +nightly fuzz run "${{ matrix.target }}" \
            --target x86_64-unknown-linux-gnu -- \
            -max_total_time=300 -malloc_limit_mb=2048 -rss_limit_mb=4096 -max_len=65536

      # On a crash, libFuzzer writes a reproducer under fuzz/artifacts — keep it.
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 7

  # ── Docker: native per-arch build, pushed to Docker Hub by digest ──────────
  docker-build:
    needs: [test, fuzz]
    runs-on: ${{ matrix.runner }}
    # Slater is a heavy Rust build (rustls/aws-lc-rs, tokio, zstd, argon2); give
    # each native arch plenty of wall-clock on the 2-vCPU runners.
    timeout-minutes: 90
    strategy:
      matrix:
        platform: [amd64, arm64]
        # Two variants per arch, published as TAGS of the SAME `hikarisystems/slater`
        # repo (not separate repos):
        #   * full → slater:<tag>      + slater:latest  (Dockerfile, s3+gcs, both bins)
        #   * lite → slater:<tag>-lite + slater:latest-lite  (Dockerfile.lite, fs-only)
        variant: [full, lite]
        include:
          # `rustflags` tunes the hot vector-kNN kernel's codegen per arch. amd64's
          # baseline is only SSE2, so bump to x86-64-v3 for AVX2+FMA (raises the CPU
          # floor to Haswell, 2013+). aarch64 already mandates NEON at baseline, so
          # no flag is needed there. (These match on `platform`, so they apply to
          # both variants of that arch.)
          - platform: amd64
            runner: blacksmith-2vcpu-ubuntu-2404
            rustflags: "-Ctarget-cpu=x86-64-v3"
          - platform: arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
            rustflags: ""
          # Per-variant Dockerfile (match on `variant`, so they apply to both
          # arches of that variant). Both push by digest to the same repo; the
          # manifest job below tags them apart.
          - variant: full
            dockerfile: Dockerfile
          - variant: lite
            dockerfile: Dockerfile.lite
    steps:
      - name: Make repo name
        run: echo "REPO_NAME=$(echo ${{ github.repository }} | sed -e 's/^Hikari-Systems\///')" >> $GITHUB_ENV

      - name: Checkout the tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.platform }}
          build-args: |
            RUSTFLAGS=${{ matrix.rustflags }}
          outputs: type=image,name=hikarisystems/${{ env.REPO_NAME }},push-by-digest=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.variant }}-${{ matrix.platform }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Docker: merge each variant's per-arch digests into a tagged manifest ─────
  # Both variants are tags of the SAME `hikarisystems/slater` repo:
  #   * full → :<tag>      + :latest
  #   * lite → :<tag>-lite + :latest-lite
  # Each job merges only its own variant's per-arch digests (matched by the
  # `digests-<variant>-*` artifact pattern); the digests live in the one repo.
  docker-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docker-build
    strategy:
      matrix:
        variant: [full, lite]
        include:
          # `tag_suffix` distinguishes the pinned tag; `moving` is the rolling tag.
          - variant: full
            tag_suffix: ""
            moving: latest
          - variant: lite
            tag_suffix: "-lite"
            moving: latest-lite
    steps:
      - name: Make repo name
        run: echo "REPO_NAME=$(echo ${{ github.repository }} | sed -e 's/^Hikari-Systems\///')" >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create the manifest (pinned + rolling tag)
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t hikarisystems/${{ env.REPO_NAME }}:${{ github.event.inputs.tag || github.ref_name }}${{ matrix.tag_suffix }} \
            -t hikarisystems/${{ env.REPO_NAME }}:${{ matrix.moving }} \
            $(printf 'hikarisystems/${{ env.REPO_NAME }}@sha256:%s ' *)

  # ── GitHub release: compiled binaries + checksums attached to the tag ──────
  release-binaries:
    needs: [test, fuzz]
    runs-on: ubuntu-latest
    env:
      # The tag this run targets: the pushed ref, or the manual dispatch input.
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          # Full history + tags so the annotated tag's message is readable below.
          fetch-depth: 0

      # The annotated tag's message is the human-written release description. We
      # prepend it to the auto-generated changelog so every release carries a
      # proper description (see CONTRIBUTING.md). A lightweight tag with no
      # annotation falls back to the generated notes alone.
      - name: Derive release notes from the tag annotation
        id: notes
        run: |
          set -euo pipefail
          body="$(git for-each-ref "refs/tags/${TAG}" --format='%(contents)')"
          if [ -z "${body//[[:space:]]/}" ]; then
            echo "::warning::tag ${TAG} has no annotation — falling back to generated notes only. Tag with 'git tag -a ${TAG} -m \"…\"' for a proper description."
          fi
          {
            echo "body<<__RELEASE_NOTES__"
            echo "$body"
            echo "__RELEASE_NOTES__"
          } >> "$GITHUB_OUTPUT"

      # rustls' aws-lc-rs backend needs a C toolchain + libclang to build (see
      # the Dockerfile builder stage); git is already present on the runner.
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --locked --bins

      # Package both binaries into one tarball named for the tag + target triple,
      # then emit a checksum file so downloaders can verify integrity.
      - name: Package binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          tarball="slater-${TAG}-${TARGET}.tar.gz"
          tar -C target/release -czf "dist/${tarball}" slater slater-build
          ( cd dist && sha256sum *.tar.gz > SHA256SUMS.txt )
          ls -l dist

      - name: Publish binaries to the GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          # The tag annotation (a proper description) is prepended to the
          # auto-generated commit changelog.
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/slater-*.tar.gz
            dist/SHA256SUMS.txt
