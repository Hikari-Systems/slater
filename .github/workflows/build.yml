name: Build and push to Docker Hub

# On a vX.Y.Z tag, build the image natively per arch (a Rust build under QEMU
# emulation would be far too slow), push each arch to Docker Hub *by digest* so
# no per-arch tags are created, then merge the digests into a single manifest
# tagged with the git tag (e.g. hikarisystems/slater:v0.1.3).
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    # Slater is a heavy Rust build (rustls/aws-lc-rs, tokio, zstd, argon2); give
    # each native arch plenty of wall-clock on the 2-vCPU runners.
    timeout-minutes: 90
    strategy:
      matrix:
        platform: [amd64, arm64]
        include:
          - platform: amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - platform: arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
    steps:
      - name: Make repo name
        run: echo "REPO_NAME=$(echo ${{ github.repository }} | sed -e 's/^Hikari-Systems\///')" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.platform }}
          outputs: type=image,name=hikarisystems/${{ env.REPO_NAME }},push-by-digest=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Make repo name
        run: echo "REPO_NAME=$(echo ${{ github.repository }} | sed -e 's/^Hikari-Systems\///')" >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create the manifest tagged with the git tag and latest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t hikarisystems/${{ env.REPO_NAME }}:${{ github.ref_name }} \
            -t hikarisystems/${{ env.REPO_NAME }}:latest \
            $(printf 'hikarisystems/${{ env.REPO_NAME }}@sha256:%s ' *)
